<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram WebApp HTML Generator</title>
  <style>
    :root {
      --bg: #0e1b2b;
      --card: #14263b;
      --card-soft: #1a3048;
      --border: #2a4563;
      --text: #e7f0fa;
      --muted: #9fb4cc;
      --accent: #4ea1ff;
      --accent-strong: #6cb3ff;
      --danger: #f56c7a;
      --radius: 14px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #13263b 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .toolbar,
    .template-row,
    .demo-row,
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      border: 1px solid var(--border);
      background: var(--card-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: 0.15s ease;
    }

    button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #051321;
      font-weight: 600;
    }

    button.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    button.danger {
      color: var(--danger);
      border-color: rgba(245, 108, 122, 0.45);
      background: rgba(245, 108, 122, 0.08);
    }

    pre {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1726;
      color: var(--text);
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      margin: 0;
      min-height: 468px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #editor {
      width: 100%;
      min-height: 360px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1726;
      color: var(--text);
      padding: 12px;
      line-height: 1.45;
      outline: none;
      font-size: 14px;
    }

    #editor:empty::before {
      content: attr(data-placeholder);
      color: var(--muted);
      pointer-events: none;
    }

    #editor p,
    #editor h3 {
      margin: 0 0 10px;
    }

    #editor ul {
      margin: 0 0 10px 20px;
      padding: 0;
    }

    .visual-category,
    .visual-block,
    .visual-placeholder {
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: rgba(78, 161, 255, 0.08);
      padding: 10px;
      margin: 0 0 10px;
    }

    .visual-category-title {
      font-weight: 700;
      margin-bottom: 8px;
      color: #b9d9ff;
    }

    .visual-placeholder {
      border-style: solid;
      background: rgba(121, 179, 255, 0.13);
      font-weight: 600;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 960px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="grid">
      <section class="panel">
        <h2>Редактор контента</h2>

        <div class="toolbar">
          <button type="button" data-action="bold" title="Жирный">Жирный</button>
          <button type="button" data-action="italic" title="Курсив">Курсив</button>
          <button type="button" data-action="bullet" title="Маркированный список">Список</button>
          <button type="button" data-action="h3" title="Заголовок h3">H3</button>
          <button type="button" data-action="category" title="Подзаголовок категории">Категория</button>
        </div>

        <div class="template-row">
          <button type="button" data-template="lesson-block">lesson-block</button>
          <button type="button" data-template="lesson-category">lesson-category</button>
          <button type="button" data-template="kinescope">Видео Kinescope</button>
          <button type="button" data-template="image">Картинка</button>
          <button type="button" data-template="pdf">PDF-блок</button>
          <button type="button" data-template="task">Задание на сегодня</button>
        </div>

        <div class="demo-row">
          <button type="button" data-demo="intro">Demo: Вступление</button>
          <button type="button" data-demo="media">Demo: Видео+файлы</button>
          <button type="button" data-demo="task">Demo: Задание</button>
        </div>

        <div id="editor" contenteditable="true" data-placeholder="Пишите текст как в обычном редакторе или добавляйте шаблоны кнопками выше..."></div>

        <div class="action-row" style="margin-top:10px;">
          <button type="button" id="clearBtn" class="danger">Очистить</button>
        </div>
        <p class="hint">HTML справа обновляется автоматически при каждом изменении слева. Двойной клик по плашкам Видео/Картинка/PDF открывает редактирование.</p>
      </section>

      <section class="panel">
        <h2>Готовый HTML-код</h2>
        <div class="action-row">
          <button type="button" id="copyBtn" class="primary">Скопировать HTML</button>
        </div>
        <pre id="output"></pre>
      </section>
    </div>
  </main>

  <template id="tplLessonBlock">
    <div class="visual-block" data-type="lesson-block">
      <p>Текст блока...</p>
    </div>
  </template>

  <template id="tplCategory">
    <div class="visual-category" data-type="lesson-category">
      <div class="visual-category-title">Заголовок категории</div>
      <p>Текст категории...</p>
    </div>
  </template>

  <script>
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function command(cmd, value = null) {
      editor.focus();
      document.execCommand(cmd, false, value);
      updateOutput();
    }

    function placeCaretAtEnd(element) {
      const range = document.createRange();
      const selection = window.getSelection();
      range.selectNodeContents(element);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
      element.focus();
    }

    function insertNodeAtCaret(node) {
      const selection = window.getSelection();
      if (!selection.rangeCount) {
        editor.appendChild(node);
        return;
      }
      const range = selection.getRangeAt(0);
      range.deleteContents();
      range.insertNode(node);
      const br = document.createElement('p');
      br.innerHTML = '<br>';
      node.after(br);
      placeCaretAtEnd(br);
    }

    function createPlaceholder(type, label, payload = {}) {
      const div = document.createElement('div');
      div.className = 'visual-placeholder';
      div.dataset.type = type;
      div.textContent = label;
      Object.entries(payload).forEach(([k, v]) => {
        div.dataset[k] = v;
      });
      return div;
    }

    function insertTemplate(type) {
      if (type === 'lesson-block') {
        const node = document.getElementById('tplLessonBlock').content.firstElementChild.cloneNode(true);
        insertNodeAtCaret(node);
      }

      if (type === 'lesson-category') {
        const node = document.getElementById('tplCategory').content.firstElementChild.cloneNode(true);
        insertNodeAtCaret(node);
      }

      if (type === 'kinescope') {
        insertNodeAtCaret(createPlaceholder('kinescope', '🎬 [ВИДЕО: https://kinescope.io/embed/VIDEO_ID]', { src: 'https://kinescope.io/embed/VIDEO_ID' }));
      }

      if (type === 'image') {
        insertNodeAtCaret(createPlaceholder('image', '🖼️ [КАРТИНКА: assets/images/day5.jpg | alt: Описание]', {
          src: 'assets/images/day5.jpg',
          alt: 'Описание'
        }));
      }

      if (type === 'pdf') {
        insertNodeAtCaret(createPlaceholder('pdf', '📄 [PDF: Гайд|assets/files/guide.pdf; Чеклист|assets/files/checklist.pdf]', {
          items: 'Гайд|assets/files/guide.pdf;Чеклист|assets/files/checklist.pdf'
        }));
      }

      if (type === 'task') {
        const task = document.createElement('div');
        task.className = 'visual-category';
        task.dataset.type = 'task';
        task.innerHTML = `
          <div class="visual-category-title">🎯 Задание на сегодня</div>
          <p>Опишите задание для студента...</p>
        `;
        insertNodeAtCaret(task);
      }
      updateOutput();
    }

    function serializeInline(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return escapeHtml(node.textContent || '');
      }

      if (node.nodeType !== Node.ELEMENT_NODE) {
        return '';
      }

      const tag = node.tagName.toLowerCase();
      const inner = Array.from(node.childNodes).map(serializeInline).join('');

      if (tag === 'strong' || tag === 'b') return `<strong>${inner}</strong>`;
      if (tag === 'em' || tag === 'i') return `<em>${inner}</em>`;
      if (tag === 'br') return '<br>';
      if (tag === 'a') {
        const href = escapeHtml(node.getAttribute('href') || '#');
        return `<a href="${href}" target="_blank" rel="noopener noreferrer">${inner || href}</a>`;
      }
      return inner;
    }

    function serializeRichNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent?.trim();
        return text ? `<p>${escapeHtml(text)}</p>` : '';
      }

      if (node.nodeType !== Node.ELEMENT_NODE) {
        return '';
      }

      const tag = node.tagName.toLowerCase();

      if (tag === 'h3') return `<h3>${Array.from(node.childNodes).map(serializeInline).join('')}</h3>`;
      if (tag === 'p' || tag === 'div') {
        const content = Array.from(node.childNodes).map(serializeInline).join('').trim();
        return content ? `<p>${content}</p>` : '';
      }
      if (tag === 'ul') {
        const li = Array.from(node.children)
          .filter((child) => child.tagName.toLowerCase() === 'li')
          .map((item) => `<li>${Array.from(item.childNodes).map(serializeInline).join('').trim() || '&nbsp;'}</li>`)
          .join('');
        return li ? `<ul>${li}</ul>` : '';
      }
      if (tag === 'ol') {
        const li = Array.from(node.children)
          .filter((child) => child.tagName.toLowerCase() === 'li')
          .map((item) => `<li>${Array.from(item.childNodes).map(serializeInline).join('').trim() || '&nbsp;'}</li>`)
          .join('');
        return li ? `<ol>${li}</ol>` : '';
      }

      return '';
    }

    function linesFromHtml(html, level = 0) {
      if (!html) return [];
      const indent = '  '.repeat(level);
      const parser = new DOMParser();
      const doc = parser.parseFromString(`<root>${html}</root>`, 'text/html');
      const root = doc.body.firstElementChild;
      const lines = [];

      function walk(node, depth) {
        const pad = '  '.repeat(depth);
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent?.trim();
          if (text) lines.push(`${pad}${text}`);
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;
        const tag = node.tagName.toLowerCase();
        const attrs = Array.from(node.attributes).map((a) => ` ${a.name}="${a.value}"`).join('');
        const children = Array.from(node.childNodes);
        if (children.length === 1 && children[0].nodeType === Node.TEXT_NODE) {
          lines.push(`${pad}<${tag}${attrs}>${children[0].textContent}</${tag}>`);
          return;
        }
        lines.push(`${pad}<${tag}${attrs}>`);
        children.forEach((child) => walk(child, depth + 1));
        lines.push(`${pad}</${tag}>`);
      }

      Array.from(root.childNodes).forEach((node) => walk(node, level));
      return lines.map((line) => (line.startsWith(indent) ? line : `${indent}${line}`));
    }

    function blockHtmlFromNode(node) {
      const type = node.dataset?.type;

      if (type === 'lesson-block') {
        const content = Array.from(node.childNodes).map(serializeRichNode).filter(Boolean).join('');
        return `<div class="lesson-block">${content || '<p>&nbsp;</p>'}</div>`;
      }

      if (type === 'lesson-category' || type === 'task') {
        const titleNode = node.querySelector('.visual-category-title');
        const title = escapeHtml((titleNode?.textContent || '').trim() || (type === 'task' ? '🎯 Задание на сегодня' : 'Заголовок категории'));
        const contentNodes = Array.from(node.childNodes).filter((child) => !child.classList?.contains('visual-category-title'));
        const body = contentNodes.map(serializeRichNode).filter(Boolean).join('') || '<p>&nbsp;</p>';
        return `<div class="lesson-category"><div class="lesson-category-title"><span class="cat-accent"></span>${title}</div>${body}</div>`;
      }

      if (type === 'kinescope') {
        const src = escapeHtml(node.dataset.src || 'https://kinescope.io/embed/VIDEO_ID');
        return `<div class="lesson-media"><div class="lesson-media__frame"><iframe class="lesson-media__content" src="${src}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe></div></div>`;
      }

      if (type === 'image') {
        const src = escapeHtml(node.dataset.src || 'assets/images/FILE_NAME.jpg');
        const alt = escapeHtml(node.dataset.alt || 'Описание');
        return `<img src="${src}" alt="${alt}" style="width:100%; border-radius:16px; margin-bottom:20px;">`;
      }

      if (type === 'pdf') {
        const raw = node.dataset.items || '';
        const items = raw
          .split(';')
          .map((part) => part.trim())
          .filter(Boolean)
          .map((item) => {
            const [title, href] = item.split('|');
            return { title: (title || 'PDF').trim(), href: (href || '#').trim() };
          });

        const list = items.length
          ? `<ul>${items.map((item) => `<li><a href="${escapeHtml(item.href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a></li>`).join('')}</ul>`
          : '<ul><li><a href="#" target="_blank" rel="noopener noreferrer">PDF</a></li></ul>';
        return `<div class="lesson-block"><h3>Материалы PDF</h3>${list}</div>`;
      }

      return serializeRichNode(node);
    }

    function updateOutput() {
      const topNodes = Array.from(editor.childNodes).filter((node) => !(node.nodeType === Node.TEXT_NODE && !node.textContent.trim()));
      const chunks = [];
      let currentSimple = [];

      const flushSimple = () => {
        if (!currentSimple.length) return;
        const html = currentSimple.map((node) => serializeRichNode(node)).filter(Boolean).join('');
        if (html) chunks.push(`<div class="lesson-block">${html}</div>`);
        currentSimple = [];
      };

      topNodes.forEach((node) => {
        if (node.nodeType === Node.ELEMENT_NODE && node.dataset?.type) {
          flushSimple();
          chunks.push(blockHtmlFromNode(node));
        } else {
          currentSimple.push(node);
        }
      });
      flushSimple();

      const lines = ['<section class="lesson-content">'];
      chunks.forEach((chunk) => {
        lines.push(...linesFromHtml(chunk, 1));
      });
      lines.push('</section>');

      output.textContent = lines.join('\n');
    }

    document.querySelectorAll('[data-action]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        if (action === 'bold') command('bold');
        if (action === 'italic') command('italic');
        if (action === 'bullet') command('insertUnorderedList');
        if (action === 'h3') command('formatBlock', 'h3');
        if (action === 'category') insertTemplate('lesson-category');
      });
    });

    document.querySelectorAll('[data-template]').forEach((btn) => {
      btn.addEventListener('click', () => {
        editor.focus();
        insertTemplate(btn.dataset.template);
      });
    });

    const demos = {
      intro: `
        <div class="visual-block" data-type="lesson-block">
          <h3>Добро пожаловать на урок 🚀</h3>
          <p><strong>Цель:</strong> понять базовый workflow Telegram WebApp.</p>
          <ul>
            <li>Что такое WebApp</li>
            <li>Как подключить бота</li>
            <li>Как оформить урок</li>
          </ul>
        </div>
      `,
      media: `
        <div class="visual-category" data-type="lesson-category">
          <div class="visual-category-title">Практика</div>
          <p>Посмотрите видео и скачайте материалы:</p>
        </div>
        <div class="visual-placeholder" data-type="kinescope" data-src="https://kinescope.io/embed/your_video_id">🎬 [ВИДЕО: https://kinescope.io/embed/your_video_id]</div>
        <div class="visual-placeholder" data-type="pdf" data-items="Чеклист|assets/files/checklist.pdf">📄 [PDF: Чеклист|assets/files/checklist.pdf]</div>
      `,
      task: `
        <div class="visual-category" data-type="task">
          <div class="visual-category-title">🎯 Задание на сегодня</div>
          <h3>Мини-практика</h3>
          <p><em>Соберите</em> первый экран курса и добавьте туда:</p>
          <ul>
            <li>Заголовок</li>
            <li>Описание</li>
            <li>Кнопку действия</li>
          </ul>
        </div>
      `
    };

    document.querySelectorAll('[data-demo]').forEach((btn) => {
      btn.addEventListener('click', () => {
        editor.innerHTML = demos[btn.dataset.demo];
        updateOutput();
      });
    });

    editor.addEventListener('dblclick', (event) => {
      const placeholder = event.target.closest('.visual-placeholder');
      if (!placeholder) return;

      const type = placeholder.dataset.type;
      if (type === 'kinescope') {
        const src = window.prompt('Ссылка на embed видео:', placeholder.dataset.src || 'https://kinescope.io/embed/VIDEO_ID');
        if (!src) return;
        placeholder.dataset.src = src;
        placeholder.textContent = `🎬 [ВИДЕО: ${src}]`;
      }

      if (type === 'image') {
        const src = window.prompt('Путь к картинке:', placeholder.dataset.src || 'assets/images/FILE_NAME.jpg');
        if (!src) return;
        const alt = window.prompt('Alt описание:', placeholder.dataset.alt || 'Описание') || 'Описание';
        placeholder.dataset.src = src;
        placeholder.dataset.alt = alt;
        placeholder.textContent = `🖼️ [КАРТИНКА: ${src} | alt: ${alt}]`;
      }

      if (type === 'pdf') {
        const value = window.prompt('Формат: Название|путь;Название|путь', placeholder.dataset.items || 'Гайд|assets/files/guide.pdf');
        if (!value) return;
        placeholder.dataset.items = value;
        placeholder.textContent = `📄 [PDF: ${value}]`;
      }
      updateOutput();
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(output.textContent);
        const copyBtn = document.getElementById('copyBtn');
        const text = copyBtn.textContent;
        copyBtn.textContent = 'Скопировано!';
        setTimeout(() => {
          copyBtn.textContent = text;
        }, 1200);
      } catch {
        alert('Не удалось скопировать. Скопируйте вручную из блока справа.');
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      editor.innerHTML = '';
      output.textContent = '';
      editor.focus();
    });

    editor.addEventListener('input', updateOutput);

    editor.innerHTML = demos.intro;
    updateOutput();
  </script>
</body>
</html>
